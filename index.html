<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroSystem - Contabilidad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            min-height: 100vh;
        }
        /* Barra lateral */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }
        .sidebar h2 {
            margin-bottom: 30px;
            font-size: 24px;
            text-align: center;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }
        .sidebar p {
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }
        .sidebar p:hover {
            background-color: #34495e;
        }
        /* Contenedor Principal */
        .main-content {
            flex: 1;
            padding: 30px;
        }
        header {
            margin-bottom: 30px;
        }
        /* Tarjetas de Resumen */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid;
        }
        .card.ingresos { border-left-color: #2ecc71; }
        .card.egresos { border-left-color: #e74c3c; }
        .card.balance { border-left-color: #3498db; }
        .card h3 {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        .card p {
            font-size: 24px;
            font-weight: bold;
        }
        /* Formulario y Tabla */
        .grid-forms {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .box h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #27ae60; }
        /* Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <!-- Menú Lateral -->
    <div class="sidebar">
        <h2>MicroSystem</h2>
        <p>📊 Dashboard</p>
        <p>🛒 Inventario</p>
        <p>🧾 Facturación</p>
        <p>⚙️ Configuración</p>
    </div>

    <!-- Contenido Principal -->
    <div class="main-content">
        <header>
            <h1>Sistema de Contabilidad</h1>
            <p>Control de ingresos, egresos y flujo de caja.</p>
        </header>

        <!-- Tarjetas de Resumen -->
        <div class="cards-container">
            <div class="card ingresos">
                <h3>INGRESOS</h3>
                <p id="total-ingresos">$0.00</p>
            </div>
            <div class="card egresos">
                <h3>EGRESOS</h3>
                <p id="total-egresos">$0.00</p>
            </div>
            <div class="card balance">
                <h3>BALANCE NETO</h3>
                <p id="balance-total">$0.00</p>
            </div>
        </div>

        <div class="grid-forms">
            <!-- Formulario para agregar transacciones -->
            <div class="box">
                <h3>Nueva Transacción</h3>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" id="desc" placeholder="Ej: Venta de producto">
                </div>
                <div class="form-group">
                    <label>Monto ($)</label>
                    <input type="number" id="monto" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="tipo">
                        <option value="ingreso">Ingreso (+)</option>
                        <option value="egreso">Egreso (-)</option>
                    </select>
                </div>
                <button onclick="agregarTransaccion()">Registrar</button>
            </div>

            <!-- Tabla de historial -->
            <div class="box">
                <h3>Historial de Movimientos</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Descripción</th>
                            <th>Tipo</th>
                            <th>Monto</th>
                        </tr>
                    </thead>
                    <tbody id="historial-tabla">
                        <!-- Las transacciones aparecerán aquí -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Lógica de Contabilidad (JavaScript) -->
    <script>
        let ingresos = 0;
        let egresos = 0;

        function agregarTransaccion() {
            const desc = document.getElementById('desc').value;
            const montoValue = document.getElementById('monto').value;
            const tipo = document.getElementById('tipo').value;

            if (desc.trim() === "" || montoValue === "") {
                alert("Por favor, llena todos los campos.");
                return;
            }

            const monto = parseFloat(montoValue);
            const tabla = document.getElementById('historial-tabla');
            const fila = document.createElement('tr');

            // Insertar datos en la tabla
            fila.innerHTML = `
                <td>${desc}</td>
                <td style="color: ${tipo === 'ingreso' ? '#2ecc71' : '#e74c3c'}">${tipo.toUpperCase()}</td>
                <td>$${monto.toFixed(2)}</td>
            `;
            tabla.appendChild(fila);

            // Actualizar totales
            if (tipo === 'ingreso') {
                ingresos += monto;
            } else {
                egresos += monto;
            }

            actualizarPantalla();

            // Limpiar formulario
            document.getElementById('desc').value = "";
            document.getElementById('monto').value = "";
        }

        function actualizarPantalla() {
            document.getElementById('total-ingresos').innerText = `$${ingresos.toFixed(2)}`;
            document.getElementById('total-egresos').innerText = `$${egresos.toFixed(2)}`;
            const balance = ingresos - egresos;
            const balanceEl = document.getElementById('balance-total');
            balanceEl.innerText = `$${balance.toFixed(2)}`;
            balanceEl.style.color = balance >= 0 ? '#2ecc71' : '#e74c3c';
        }
    </script>
</body>
</html>
